services:
  db:
    image: memppi-atlas-db:local
    container_name: memppi-atlas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - memppi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  rest:
    image: memppi-atlas-rest:local
    container_name: memppi-atlas-rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_MAX_ROWS: 1000
      PGRST_DB_EXTRA_SEARCH_PATH: public
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600

  supabase-gateway:
    image: memppi-atlas-gateway:local
    container_name: memppi-atlas-supabase-gateway
    restart: unless-stopped
    depends_on:
      - rest
    ports:
      - "${SUPABASE_PORT:-54321}:8000"
    volumes:
      - ./docker/nginx/supabase-gateway.conf:/etc/nginx/conf.d/default.conf:ro

  asset-seed:
    image: memppi-atlas-assets:local
    container_name: memppi-atlas-asset-seed
    restart: "no"
    volumes:
      - memppi_structure_assets:/structure-assets

  memppi-atlas:
    image: memppi-atlas:local-supabase
    container_name: memppi-atlas
    restart: unless-stopped
    depends_on:
      supabase-gateway:
        condition: service_started
      asset-seed:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      SUPABASE_URL: http://supabase-gateway:8000
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      STRUCTURE_ASSET_ROOT: /app/structure-assets
    volumes:
      - memppi_structure_assets:/app/structure-assets:ro

volumes:
  memppi_postgres_data:
  memppi_structure_assets:
